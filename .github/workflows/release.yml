name: Build, Validate, and Release Rival 3 package

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-native:
    name: Build native libraries
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            lib_name: rival3_ffi.dll
            artifact_name: native-win32-x86_64

          - os: ubuntu-latest
            lib_name: librival3_ffi.so
            artifact_name: native-x86_64-linux

          - os: macos-latest
            lib_name: librival3_ffi.dylib
            artifact_name: native-aarch64-macosx

          - os: macos-15-intel
            lib_name: librival3_ffi.dylib
            artifact_name: native-x86_64-macosx

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust compiler (Linux / macOS)
        if: runner.os != 'Windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Rust compiler (Windows GNU)
        if: runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-gnu

      - name: Setup MSYS2 build tools (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: |
            diffutils
            m4
            make
            mingw-w64-x86_64-gcc

      - name: Build rival3-ffi (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cargo build --release --manifest-path=rival3-ffi/Cargo.toml

      - name: Build rival3-ffi (Linux / macOS)
        if: runner.os != 'Windows'
        run: cargo build --release --manifest-path=rival3-ffi/Cargo.toml

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: rival3-ffi/target/release/${{ matrix.lib_name }}
          if-no-files-found: error

  assemble-fat-package:
    name: Assemble fat package
    runs-on: ubuntu-latest
    needs: build-native

    steps:
      - uses: actions/checkout@v5

      - name: Install Racket
        uses: Bogdanp/setup-racket@v1.14
        with:
          version: 8.18
          architecture: x64

      - name: Download native libraries
        uses: actions/download-artifact@v4
        with:
          path: native-artifacts
          pattern: native-*
          merge-multiple: false

      # Place each library under rival3-racket/private/native/<platform>/
      - name: Assemble fat package tree
        run: |
          set -eux
          mkdir -p rival3-racket/private/native/win32/x86_64
          mkdir -p rival3-racket/private/native/x86_64-linux
          mkdir -p rival3-racket/private/native/x86_64-linux-natipkg
          mkdir -p rival3-racket/private/native/aarch64-macosx
          mkdir -p rival3-racket/private/native/x86_64-macosx

          cp native-artifacts/native-win32-x86_64/rival3_ffi.dll rival3-racket/private/native/win32/x86_64/
          cp native-artifacts/native-x86_64-linux/librival3_ffi.so rival3-racket/private/native/x86_64-linux/
          cp native-artifacts/native-x86_64-linux/librival3_ffi.so rival3-racket/private/native/x86_64-linux-natipkg/
          cp native-artifacts/native-aarch64-macosx/librival3_ffi.dylib rival3-racket/private/native/aarch64-macosx/
          cp native-artifacts/native-x86_64-macosx/librival3_ffi.dylib rival3-racket/private/native/x86_64-macosx/

      - name: Create fat zip
        run: raco pkg create --format zip rival3-racket

      - name: Upload fat package artifact
        uses: actions/upload-artifact@v4
        with:
          name: rival3-racket-fat-package
          path: |
            rival3-racket.zip
            rival3-racket.zip.CHECKSUM
          if-no-files-found: error

  validate-fat-package:
    name: Validate fat package
    runs-on: ${{ matrix.os }}
    needs: assemble-fat-package
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
          - os: ubuntu-latest
            arch: x64
          - os: macos-latest
            arch: arm64
          - os: macos-15-intel
            arch: x64

    steps:
      - uses: actions/checkout@v5

      - name: Install Racket
        uses: Bogdanp/setup-racket@v1.14
        with:
          version: 8.18
          architecture: ${{ matrix.arch }}

      - name: Download fat package artifact
        uses: actions/download-artifact@v4
        with:
          name: rival3-racket-fat-package
          path: .

      - name: Install and smoke test package
        shell: bash
        env:
          PLTUSERHOME: ${{ runner.temp }}/pltuserhome
        run: |
          set -eux
          mkdir -p "$PLTUSERHOME"
          raco pkg install --user --batch --auto -D --type file rival3-racket.zip
          racket infra/smoke-test.rkt

  release:
    name: Create release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: validate-fat-package
    permissions:
      contents: write

    steps:
      - name: Download fat package artifact
        uses: actions/download-artifact@v4
        with:
          name: rival3-racket-fat-package
          path: .

      - name: Create Release
        uses: ncipollo/release-action@v1.20.0
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          prerelease: false
          artifactErrorsFailBuild: true
          artifacts: "rival3-racket.zip,rival3-racket.zip.CHECKSUM"
